name: Generate arcade animation

on:
  schedule:
    - cron: "0 */12 * * *" # Corregido: Se ejecuta cada 12 horas en punto
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'pacman'

      # Este paso acomoda el archivo en la carpeta 'dist' para que no falle
      - name: Move SVG to dist directory
        run: |
          mkdir -p dist
          mv pacman-contribution-graph.svg dist/

      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
